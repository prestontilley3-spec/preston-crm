name: Run Database Migrations

on:
  workflow_dispatch:
    inputs:
      db_password:
        description: 'Supabase Database Password'
        required: true
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run SQL migrations
        env:
          PGPASSWORD: ${{ inputs.db_password }}
        run: |
          psql "postgresql://postgres.roghzufimqhiphqpmlhu:${PGPASSWORD}@aws-0-us-east-1.pooler.supabase.com:6543/postgres" << 'SQL'
          CREATE TABLE IF NOT EXISTS interactions (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            created_at timestamptz DEFAULT now(),
            date date,
            category text,
            summary text,
            action_items text,
            status text,
            notes text
          );
          
          CREATE TABLE IF NOT EXISTS tile_jobs (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            created_at timestamptz DEFAULT now(),
            client_name text,
            client_phone text,
            client_email text,
            job_type text,
            description text,
            estimated_value numeric,
            stage text,
            score integer,
            notes text,
            job_date date
          );
          
          CREATE TABLE IF NOT EXISTS contacts (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            created_at timestamptz DEFAULT now(),
            name text,
            phone text,
            email text,
            category text,
            company text,
            notes text,
            last_contact date
          );
          
          CREATE TABLE IF NOT EXISTS tasks (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            created_at timestamptz DEFAULT now(),
            title text,
            description text,
            due_date date,
            priority text,
            status text,
            category text
          );
          
          ALTER TABLE interactions ENABLE ROW LEVEL SECURITY;
          ALTER TABLE tile_jobs ENABLE ROW LEVEL SECURITY;
          ALTER TABLE contacts ENABLE ROW LEVEL SECURITY;
          ALTER TABLE tasks ENABLE ROW LEVEL SECURITY;
          
          CREATE POLICY IF NOT EXISTS "allow_all" ON interactions FOR ALL USING (true) WITH CHECK (true);
          CREATE POLICY IF NOT EXISTS "allow_all" ON tile_jobs FOR ALL USING (true) WITH CHECK (true);
          CREATE POLICY IF NOT EXISTS "allow_all" ON contacts FOR ALL USING (true) WITH CHECK (true);
          CREATE POLICY IF NOT EXISTS "allow_all" ON tasks FOR ALL USING (true) WITH CHECK (true);
          
          SELECT 'Migration complete!' as status;
          SQL
